<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f1117">
    <meta name="description" content="Secure offline password manager">
    <title>PassVault - Password Manager</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <h1>PassVault</h1>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-btn active" data-filter="all">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                    All Passwords
                </button>
                <button class="nav-btn" data-filter="favorites">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                    </svg>
                    Favorites
                </button>
                <button class="nav-btn" data-filter="social">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    Social
                </button>
                <button class="nav-btn" data-filter="finance">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="1" x2="12" y2="23"/>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                    </svg>
                    Finance
                </button>
                <button class="nav-btn" data-filter="work">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
                        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                    </svg>
                    Work
                </button>
                <button class="nav-btn" data-filter="other">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="1"/>
                        <circle cx="19" cy="12" r="1"/>
                        <circle cx="5" cy="12" r="1"/>
                    </svg>
                    Other
                </button>
            </nav>
            <div class="sidebar-footer">
                <div class="stats">
                    <span class="stat-item">
                        <strong id="total-count">0</strong> Total
                    </span>
                </div>
            </div>
        </aside>
        <main class="main-content">
            <header class="top-bar">
                <div class="search-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="M21 21l-4.35-4.35"/>
                    </svg>
                    <input type="text" id="search-input" placeholder="Search passwords...">
                </div>
                <div class="top-actions">
                    <button class="icon-btn" id="generate-btn" title="Generate Password">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="16 18 22 12 16 6"/>
                            <polyline points="8 6 2 12 8 18"/>
                        </svg>
                    </button>
                </div>
            </header>
            <div class="content-area">
                <div class="content-header">
                    <h2 id="section-title">All Passwords</h2>
                    <button class="add-btn" id="add-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        Add New
                    </button>
                </div>
                <div class="password-grid" id="password-grid">
                </div>
                <div class="empty-state" id="empty-state" style="display: none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <h3>No passwords yet</h3>
                    <p>Click "Add New" to save your first password</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Password Modal -->
    <div class="modal-overlay" id="password-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">Add Password</h2>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="form-group">
                        <label>Website/Service</label>
                        <input type="text" id="entry-name" placeholder="e.g., Google, Netflix">
                    </div>
                    <div class="form-group">
                        <label>URL</label>
                        <input type="url" id="entry-url" placeholder="https://example.com">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Username / Email</label>
                        <input type="text" id="entry-username" placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="entry-category">
                            <option value="other">Other</option>
                            <option value="social">Social</option>
                            <option value="finance">Finance</option>
                            <option value="work">Work</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="entry-password" placeholder="Enter password">
                        <button type="button" class="toggle-visibility" id="toggle-entry-password">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                        <button type="button" class="generate-inline" id="generate-inline-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="16 18 22 12 16 6"/>
                                <polyline points="8 6 2 12 8 18"/>
                            </svg>
                        </button>
                    </div>
                    <div class="password-strength" id="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strength-fill"></div>
                        </div>
                        <span class="strength-text" id="strength-text"></span>
                    </div>
                </div>
                <div class="form-group">
                    <label>Notes (optional)</label>
                    <textarea id="entry-notes" placeholder="Any additional notes..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancel-btn">Cancel</button>
                <button class="btn-primary" id="save-btn">Save Password</button>
            </div>
        </div>
    </div>

    <!-- View Password Modal -->
    <div class="modal-overlay" id="view-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="view-name"></h2>
                <button class="close-btn" id="view-close-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="view-details">
                    <div class="detail-item">
                        <span class="detail-label">URL</span>
                        <a href="#" target="_blank" id="view-url" class="detail-value link"></a>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Username</span>
                        <div class="detail-value-row">
                            <span id="view-username" class="detail-value"></span>
                            <button class="copy-btn" data-copy="username">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Password</span>
                        <div class="detail-value-row">
                            <span id="view-password" class="detail-value masked"></span>
                            <button class="copy-btn" data-copy="password">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                                </svg>
                            </button>
                            <button class="toggle-view-password" id="toggle-view-password">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="detail-item" id="view-notes-item" style="display: none;">
                        <span class="detail-label">Notes</span>
                        <p id="view-notes" class="detail-value notes"></p>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-danger" id="delete-btn">Delete</button>
                <button class="btn-secondary" id="edit-btn">Edit</button>
            </div>
        </div>
    </div>

    <!-- Password Generator Modal -->
    <div class="modal-overlay" id="generator-modal">
        <div class="modal generator-modal">
            <div class="modal-header">
                <h2>Password Generator</h2>
            </div>
            <div class="modal-body">
                <div class="generated-password">
                    <span id="generated-password"></span>
                    <button class="copy-btn" id="copy-generated-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                        </svg>
                    </button>
                </div>
                <div class="generator-options">
                    <div class="form-group">
                        <label>Length: <span id="length-value">16</span></label>
                        <input type="range" id="password-length" min="8" max="64" value="16">
                    </div>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="opt-uppercase" checked>
                            Uppercase (A-Z)
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="opt-lowercase" checked>
                            Lowercase (a-z)
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="opt-numbers" checked>
                            Numbers (0-9)
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="opt-symbols" checked>
                            Symbols (!@#$%^&*)
                        </label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="generator-close-btn">Close</button>
                <button class="btn-primary" id="regenerate-btn">Regenerate</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <span id="toast-message"></span>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>
</html>
